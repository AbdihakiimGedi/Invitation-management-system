services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-Digital Invitation & Attendance Management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./dataabse.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: ${POSTGRES_DB:-Digital Invitation & Attendance Management}
      JWT_SECRET: ${JWT_SECRET:-${SERVICE_BASE64_64_JWT_SECRET:?JWT_SECRET is required}}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://kk0g84k04ow0cgs8owsckgwg.38.242.148.212.sslip.io}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-1mb}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-5242880}
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://kk0g84k04ow0cgs8owsckgwg.38.242.148.212.sslip.io/api/v1}
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
